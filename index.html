<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Toolbox | Share & Borrow</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo">🛠️ Community<span>Toolbox</span></div>
        <nav>
            <a href="#stats">Dashboard</a>
            <a href="#inventory">Browse Tools</a>
            <button id="openFormBtn" class="btn-primary">+ Register Tool</button>
        </nav>
    </header>

    <section class="hero" id="stats">
        <div class="hero-content">
            <h1>Hello, Resident</h1>
            <p>Ready to get to work? Borrow and share equipment within your building instantly.</p>
            <div class="stats-container">
                <div class="stat-card">
                    <h2 id="utilizationRate">0%</h2>
                    <p>Community Utilization</p>
                </div>
                <div class="stat-card">
                    <h2 id="totalTools">0</h2>
                    <p>Total Tools</p>
                </div>
            </div>
        </div>
    </section>

    <main class="container">
        <section class="controls">
            <input type="text" id="searchInput" placeholder="Search for a tool...">
        </section>
    
        <section class="inventory-section" id="inventory">
            <h3>Available Inventory</h3>
            <div id="toolGrid" class="tool-grid">
                </div>
        </section>
    </main>


    <script src="script.js"></script>
</body>
</html>
